<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESCULAPE - Vietnam Dental & Medical Tourism</title>
    <link rel="icon" type="image/png" href="images/logo.png">
    
    <meta name="description" content="High-quality Dental & Medical Tourism in Vietnam. Premium dental implants and cosmetic dentistry.">
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;1,700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.5.0/remixicon.min.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-white text-gray-900">

    <nav class="fixed top-0 left-0 right-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-100">
        <div class="max-w-screen-xl mx-auto px-6 py-4 flex items-center justify-between">
            <a href="#"><img src="images/logo.png" class="h-10" alt="Logo"></a>
            <ul class="hidden md:flex gap-8 font-medium text-sm tracking-wide">
                <li><a href="#services" class="hover:text-amber-600 transition-colors">SERVICES</a></li>
                <li><a href="https://dentaltourisminvietnam.com/" target="_blank" class="hover:text-amber-600 transition-colors">ABOUT US</a></li>
                <li><a href="blog.html" class="text-amber-700 font-bold hover:text-amber-500 transition-colors">BLOG</a></li>
                <li><a href="#contact" class="hover:text-amber-600 transition-colors">CONTACT</a></li>
            </ul>
            <button onclick="openPopup()" class="btn-primary px-6 py-2.5 rounded-full text-xs font-bold uppercase tracking-tighter">Book Now</button>
        </div>
    </nav>

    <a href="https://wa.me/84396138466" target="_blank" 
       class="floating-btn fixed bottom-6 right-6 z-50 p-4 rounded-full shadow-2xl flex items-center justify-center text-white" 
       style="background: #25D366; width: 60px; height: 60px;">
        <i class="ri-whatsapp-line text-3xl"></i>
    </a>

    <div class="pt-24">
        <section id="services" class="py-20 text-center">
            <h2 class="font-serif text-4xl mb-4 italic">Our Premium Services</h2>
            <div class="w-20 h-1 bg-amber-500 mx-auto"></div>
        </section>
    </div>

    <div id="main-popup" class="fixed inset-0 z-[100] hidden flex items-center justify-center bg-black/60 backdrop-blur-sm px-4">
        <div class="bg-white rounded-[2.5rem] max-w-lg w-full overflow-hidden relative shadow-2xl">
            <button onclick="closePopup()" class="absolute top-6 right-6 text-gray-400 hover:text-amber-600 transition-colors">
                <i class="ri-close-line text-3xl"></i>
            </button>
            
            <div class="p-10">
                <div class="text-center mb-8">
                    <img src="images/logo.png" class="h-14 mx-auto mb-4" alt="Logo">
                    <h3 class="text-3xl font-serif font-bold text-gray-800">Premium Consultation</h3>
                    <p class="text-gray-500 mt-2 font-light italic">Excellence in Every Smile</p>
                </div>

                <form action="https://formspree.io/f/esculapedental@gmail.com" method="POST" class="space-y-5">
                    <input type="text" name="name" required placeholder="Full Name" class="input-field">
                    <input type="tel" name="phone" required placeholder="Phone Number (WhatsApp)" class="input-field">
                    <textarea name="message" placeholder="How can we assist your dental journey?" class="input-field h-32 resize-none"></textarea>
                    <button type="submit" class="btn-primary w-full py-4 rounded-2xl font-bold text-white uppercase tracking-widest">
                        Send Request
                    </button>
                </form>
            </div>
        </div>
    </div>

    <section id="contact" class="py-20 bg-gray-50">
        <div class="max-w-screen-xl mx-auto px-6">
            <h2 class="text-center text-3xl font-serif mb-12 text-gray-800 italic">Visit Our Clinic</h2>
            <div class="rounded-[2.5rem] overflow-hidden shadow-2xl border-8 border-white h-[450px]">
                <iframe 
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3919.46023242835!2d106.6920257!3d10.7760194!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x31752f3af22edb3b%3A0x4523674627453b3b!2zQuG7h25oIHZp4buHbiBSxINnIEjDoG0gTeG6t3QgVFAuSENN!5e0!3m2!1svi!2s!4v1700000000000!5m2!1svi!2s" 
                    width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy">
                </iframe>
            </div>
        </div>
    </section>

    <footer class="bg-white py-16 border-t border-gray-100">
        <div class="max-w-screen-xl mx-auto px-6 text-center">
            <div class="flex justify-center gap-10 mb-10">
                <a href="https://www.facebook.com/Esculape.Vietnamdental/" target="_blank" class="floating-btn text-2xl text-gray-400 hover:text-amber-600"><i class="ri-facebook-fill"></i></a>
                <a href="https://www.instagram.com/vietnam_dental_tourism_/" target="_blank" class="floating-btn text-2xl text-gray-400 hover:text-amber-600"><i class="ri-instagram-line"></i></a>
                <a href="https://www.youtube.com/@DentalEsculape" target="_blank" class="floating-btn text-2xl text-gray-400 hover:text-amber-600"><i class="ri-youtube-fill"></i></a>
                <a href="https://www.linkedin.com/company/esculape-vietnam-dental-tourism/" target="_blank" class="floating-btn text-2xl text-gray-400 hover:text-amber-600"><i class="ri-linkedin-fill"></i></a>
            </div>
            <p class="text-gray-400 text-sm font-light tracking-widest uppercase">© 2024 ESCULAPE Vietnam Dental Tourism</p>
        </div>
    </footer>

    <script>
        const popup = document.getElementById('main-popup');
        
        function openPopup() {
            popup.classList.remove('hidden');
        }

        function closePopup() {
            popup.classList.add('hidden');
        }

        window.onload = () => {
            setTimeout(openPopup, 3000);
        };
    </script>
</body>
</html>
